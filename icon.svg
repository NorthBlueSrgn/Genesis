<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <linearGradient id="helixGradient" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#a855f7" />
            <stop offset="100%" stop-color="#22d3ee" />
        </linearGradient>
    </defs>
    
    <!-- Background Depth -->
    <circle cx="50" cy="50" r="48" fill="#010409" stroke="#1e293b" stroke-width="0.5" />

    <!-- Chromatic Aberration Ghosting -->
    <g transform="translate(1, 0.5)" opacity="0.15" stroke="#ff00ff" stroke-width="1.5" fill="none" stroke-linecap="round">
        <path d="M 40,85 C 40,85 60,75 60,65 C 60,55 40,45 40,35 C 40,25 60,15 60,15" />
        <path d="M 60,85 C 60,85 40,75 40,65 C 40,55 60,45 60,35 C 60,25 40,15 40,15" />
    </g>

    <!-- Main Helix -->
    <g filter="url(#neonGlow)">
        <!-- DNA Strands (Organic Curve with Sharp Terminator Nodes) -->
        <path d="M 40,85 C 40,85 60,75 60,65 C 60,55 40,45 40,35 C 40,25 60,15 60,15" 
              stroke="url(#helixGradient)" stroke-width="2.5" fill="none" stroke-linecap="round" />
        <path d="M 60,85 C 60,85 40,75 40,65 C 40,55 60,45 60,35 C 60,25 40,15 40,15" 
              stroke="url(#helixGradient)" stroke-width="2.5" fill="none" stroke-linecap="round" />
        
        <!-- Connecting Base Pairs -->
        <line x1="43" y1="78" x2="57" y2="78" stroke="url(#helixGradient)" stroke-width="1" opacity="0.4" />
        <line x1="50" y1="65" x2="50" y2="65" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.8" />
        <line x1="43" y1="52" x2="57" y2="52" stroke="url(#helixGradient)" stroke-width="1" opacity="0.4" />
        <line x1="50" y1="35" x2="50" y2="35" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.8" />
        <line x1="43" y1="22" x2="57" y2="22" stroke="url(#helixGradient)" stroke-width="1" opacity="0.4" />

        <!-- Active Asset Node (The 'Heart' of the Protocol) -->
        <circle cx="50" cy="50" r="1.5" fill="#fff">
            <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
            <animate attributeName="r" values="1.5;2.5;1.5" dur="4s" repeatCount="indefinite" />
        </circle>
    </g>
</svg>
